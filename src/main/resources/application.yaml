server:
  port: 8084

spring:
  application:
    name: product-service

  data:
    mongodb:
      uri: mongodb://localhost:27017/product_db

    redis:
      host: localhost
      port: 6379

  cache:
    type: redis

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka